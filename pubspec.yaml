name: manage_your_finance
description: "A personal finance management app built for students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database (offline persistence)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts for visual reports
  fl_chart: ^0.68.0

  # Unique IDs for transactions/budgets
  uuid: ^4.4.0

  # Date formatting
  intl: ^0.19.0

  # Icons (Material Icons ship with Flutter core — no extra package needed)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation for Hive type adapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  # Uncomment and add real font files if you want a custom font.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

  assets:
    - assets/icons/
